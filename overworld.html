<!DOCTYPE html>
<html>
<head>
  <title>Game Map</title>
</head>

<body style="margin:0; background: lightgreen; overflow:hidden;">

<h2 style="text-align:center;">🌍 Map</h2>

<div id="map" style="position:relative; width:100vw; height:80vh;">

  <!-- SVG curved path -->
  <svg style="position:absolute; width:100%; height:100%;">
    <path id="path1" d="M150 400 Q 400 200 650 400"
          stroke="white" stroke-width="10" fill="none"/>
  </svg>

  <!-- Nodes -->
  <div onclick="move()" style="position:absolute; left:130px; top:370px; width:60px; height:60px; background:gold; border-radius:50%; text-align:center; line-height:60px; font-weight:bold; cursor:pointer;">1</div>

  <div onclick="go()" style="position:absolute; left:630px; top:370px; width:60px; height:60px; background:gold; border-radius:50%; text-align:center; line-height:60px; font-weight:bold; cursor:pointer;">2</div>

  <!-- Avatar -->
  <div id="avatar" style="position:absolute; width:40px; height:40px; background:red; border-radius:50%;"></div>

</div>

<script>
  const avatar = document.getElementById("avatar");

  // start position
  avatar.style.left = "150px";
  avatar.style.top = "400px";

  function move(){

    const path = document.getElementById("path1");
    const length = path.getTotalLength();

    let progress = 0;

    function animate(){
      progress += 3;

      let point = path.getPointAtLength(progress);

      avatar.style.left = (point.x - 20) + "px";
      avatar.style.top = (point.y - 20) + "px";

      if(progress < length){
        requestAnimationFrame(animate);
      }
    }

    animate();
  }

  function go(){
    window.location.href = "world-math.html";
  }
</script>

</body>
</html>
