<!DOCTYPE html>
<html>
<head>
  <title>Game Map</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#87CEEB, #b2f2bb);
      font-family: Arial;
    }

    #map {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    svg {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    path {
      stroke: white;
      stroke-width: 8;
      fill: none;
      stroke-linecap: round;
    }

    .node {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: gold;
      border: 4px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      z-index: 5;
      font-size: 20px;
    }

    #avatar {
      position: absolute;
      width: 64px;
      height: 64px;
      background-image: url("https://i.imgur.com/6X12F6L.png");
      background-size: 256px 64px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="map">

  <svg>
    <path id="path1" d="M150 600 Q 400 300 650 500" />
  </svg>

  <div class="node" style="left:130px; top:580px;" onclick="move()">1</div>
  <div class="node" style="left:630px; top:480px;" onclick="go()">2</div>

  <div id="avatar"></div>

</div>

<script>
  const avatar = document.getElementById("avatar");

  avatar.style.left = "130px";
  avatar.style.top = "580px";

  let frame = 0;
  let walking;

  function startWalk(){
    walking = setInterval(()=>{
      frame = (frame + 1) % 4;
      avatar.style.backgroundPosition = `-${frame*64}px 0`;
    },120);
  }

  function stopWalk(){
    clearInterval(walking);
  }

  function move(){
    const path = document.getElementById("path1");
    const length = path.getTotalLength();

    let progress = 0;

    startWalk();

    function animate(){
      progress += 3;
      let point = path.getPointAtLength(progress);

      avatar.style.left = (point.x - 32) + "px";
      avatar.style.top = (point.y - 32) + "px";

      if(progress < length){
        requestAnimationFrame(animate);
      } else {
        stopWalk();
      }
    }

    animate();
  }

  function go(){
    window.location.href = "world-math.html";
  }
</script>

</body>
</html>
