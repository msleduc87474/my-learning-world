<!DOCTYPE html>
<html>
<head>
  <title>Game Map</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(#87CEEB, #b2f2bb);
      overflow: hidden;
      font-family: Arial;
    }

    #map {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    svg {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    path {
      stroke: white;
      stroke-width: 10;
      fill: none;
      stroke-linecap: round;
    }

    .node {
      position: absolute;
      width: 60px;
      height: 60px;
      background: gold;
      border-radius: 50%;
      border: 4px solid white;
      text-align: center;
      line-height: 60px;
      font-weight: bold;
      cursor: pointer;
      z-index: 5;
    }

    #avatar {
      position: absolute;
      width: 64px;
      height: 64px;
      background-image: url("https://raw.githubusercontent.com/jlongster/canvas-game-bootstrap/master/assets/images/sprites/player.png");
      background-size: 256px 64px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="map">

  <!-- Path -->
  <svg>
    <path id="path1" d="M150 400 Q 400 200 650 400" />
  </svg>

  <!-- Nodes -->
  <div class="node" style="left:130px; top:370px;" onclick="move()">1</div>
  <div class="node" style="left:630px; top:370px;" onclick="go()">2</div>

  <!-- Avatar -->
  <div id="avatar"></div>

</div>

<script>
  const avatar = document.getElementById("avatar");

  // start position
  avatar.style.left = "150px";
  avatar.style.top = "400px";

  // animation system
  let frame = 0;
  let walking = false;
  let walkInterval;

  function startWalking(){
    if(walking) return;

    walking = true;

    walkInterval = setInterval(()=>{
      frame = (frame + 1) % 4;
      avatar.style.backgroundPosition = `-${frame * 64}px 0px`;
    }, 120);
  }

  function stopWalking(){
    walking = false;
    clearInterval(walkInterval);
  }

  function move(){

    const path = document.getElementById("path1");
    const length = path.getTotalLength();

    let progress = 0;

    startWalking();

    function animate(){
      progress += 3;

      let point = path.getPointAtLength(progress);
      let nextPoint = path.getPointAtLength(progress + 1);

      avatar.style.left = (point.x - 32) + "px";
      avatar.style.top = (point.y - 32) + "px";

      // direction
      let dx = nextPoint.x - point.x;
      if(dx < 0){
        avatar.style.transform = "scaleX(-1)";
      } else {
        avatar.style.transform = "scaleX(1)";
      }

      if(progress < length){
        requestAnimationFrame(animate);
      } else {
        stopWalking();
      }
    }

    animate();
  }

  function go(){
    window.location.href = "world-math.html";
  }
</script>

</body>
</html>
