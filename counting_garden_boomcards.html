<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Counting Garden — Boom Cards Deck</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a2744;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Boom-style top chrome */
  .boom-chrome {
    width: 100%;
    max-width: 580px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .deck-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); }
  .card-counter { font-size: 13px; color: rgba(255,255,255,0.55); }
  .score-chip {
    background: #f0a500;
    border-radius: 99px;
    padding: 4px 13px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  /* Progress bar */
  .prog-track {
    width: 100%;
    max-width: 580px;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: #4cd47a;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 580px;
    background: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    min-height: 420px;
    display: flex;
    flex-direction: column;
  }

  /* Card header stripe */
  .card-stripe {
    height: 8px;
    background: #185FA5;
  }

  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 24px 16px;
    text-align: center;
  }

  /* Card type badges */
  .card-type-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 16px;
  }
  .badge-learn  { background: #E1F5EE; color: #085041; }
  .badge-quiz   { background: #E6F1FB; color: #0C447C; }
  .badge-sort   { background: #FAEEDA; color: #633806; }
  .badge-finish { background: #EEEDFE; color: #3C3489; }

  /* Instruction text */
  .card-instruction {
    font-size: 19px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .card-hint {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }

  /* Object display */
  .objects-area {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .obj {
    width: 58px; height: 58px;
    border-radius: 14px;
    background: #f4f6ff;
    border: 2px solid #e0e8ff;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    animation: pop 0.22s ease both;
  }
  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .obj:nth-child(2){ animation-delay:.06s }
  .obj:nth-child(3){ animation-delay:.12s }
  .obj:nth-child(4){ animation-delay:.18s }
  .obj:nth-child(5){ animation-delay:.24s }

  /* Learn card: big number */
  .big-num  { font-size: 90px; font-weight: 900; color: #185FA5; line-height: 1; }
  .num-word { font-size: 22px; color: #999; margin-top: 2px; margin-bottom: 18px; }

  /* Multiple choice answers */
  .choices {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .choice {
    min-width: 72px; height: 72px;
    border-radius: 16px;
    border: 3px solid #dde4f0;
    background: #fff;
    font-size: 30px; font-weight: 800;
    color: #1a1a2e;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s, border-color .18s, background .18s;
    padding: 0 12px;
  }
  .choice:not(:disabled):hover  { transform: scale(1.1); border-color: #185FA5; }
  .choice:not(:disabled):active { transform: scale(0.94); }
  .choice.correct { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
  .choice.wrong   { border-color: #E24B4A; background: #FFEEEE; color: #a32d2d; }

  /* Drag-sort card */
  .sort-area { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 340px; }
  .sort-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-radius: 12px;
    border: 2.5px solid #dde4f0;
    background: #f8faff;
    cursor: pointer;
    font-size: 22px;
    gap: 10px;
    transition: border-color .18s, background .18s;
    user-select: none;
  }
  .sort-item:hover { border-color: #185FA5; background: #eef3ff; }
  .sort-item.selected { border-color: #185FA5; background: #ddeeff; }
  .sort-item.correct { border-color: #1D9E75; background: #E1F5EE; }
  .sort-item.wrong   { border-color: #E24B4A; background: #FFEEEE; }
  .sort-label { font-size: 13px; color: #888; font-weight: 600; flex: 1; text-align: right; }

  /* Type-in card */
  .type-input {
    font-size: 32px; font-weight: 800; color: #1a1a2e;
    border: 3px solid #dde4f0; border-radius: 14px;
    padding: 12px 24px; text-align: center;
    width: 140px; outline: none;
    margin-bottom: 12px;
    transition: border-color .18s;
  }
  .type-input:focus { border-color: #185FA5; }
  .type-input.correct { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
  .type-input.wrong   { border-color: #E24B4A; background: #FFEEEE; color: #a32d2d; }
  .submit-btn {
    padding: 11px 32px; border-radius: 99px;
    border: none; background: #185FA5; color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .submit-btn:hover { background: #0C447C; }
  .submit-btn:disabled { background: #b0c8e8; cursor: default; }

  /* Feedback */
  .feedback { font-size: 15px; font-weight: 700; margin-top: 14px; min-height: 24px; }
  .feedback.good { color: #085041; }
  .feedback.bad  { color: #a32d2d; }

  /* Audio button (simulated) */
  .audio-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 16px; border-radius: 99px;
    border: 2px solid #e0e8ff; background: #f4f6ff;
    font-size: 13px; font-weight: 600; color: #185FA5;
    cursor: pointer; margin-bottom: 18px;
  }
  .audio-btn:hover { background: #e0e8ff; }
  .speaker-icon { width: 18px; height: 18px; }

  /* Card footer nav */
  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px;
    border-top: 1.5px solid #f0f0f0;
    gap: 10px;
  }
  .fn-back {
    padding: 10px 22px; border-radius: 99px;
    border: 2px solid #ddd; background: transparent;
    font-size: 14px; font-weight: 600; color: #888; cursor: pointer;
  }
  .fn-back:disabled { opacity: .3; cursor: default; }
  .fn-back:not(:disabled):hover { background: #f5f5f5; }
  .fn-next {
    padding: 10px 28px; border-radius: 99px;
    border: none; background: #185FA5; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .fn-next:disabled { background: #b0c8e8; cursor: default; }
  .fn-next:not(:disabled):hover { background: #0C447C; }

  /* Finish screen */
  .finish {
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 24px;
  }
  .finish-trophy { font-size: 72px; margin-bottom: 10px; }
  .finish-title  { font-size: 26px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
  .finish-sub    { font-size: 15px; color: #666; margin-bottom: 18px; }
  .score-display {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
  }
  .score-card {
    background: #f4f6ff; border-radius: 14px; padding: 14px 20px;
    text-align: center; border: 2px solid #e0e8ff; min-width: 90px;
  }
  .sc-num  { font-size: 28px; font-weight: 800; color: #185FA5; }
  .sc-label{ font-size: 11px; color: #888; font-weight: 600; margin-top: 2px; }
  .badges-earned {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap;
  }
  .badge-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .badge-ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 3px solid #1D9E75; background: #E1F5EE;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .badge-lbl { font-size: 10px; color: #888; text-align: center; line-height: 1.3; max-width: 60px; }
  .replay-btn {
    padding: 12px 32px; border-radius: 99px;
    border: 2.5px solid #185FA5; background: transparent;
    color: #185FA5; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .replay-btn:hover { background: #f0f5ff; }
</style>
</head>
<body>

<div class="boom-chrome">
  <span class="deck-title">The Counting Garden</span>
  <span class="card-counter" id="counter">Card 1 of 12</span>
  <span class="score-chip" id="score-chip">0 / 0</span>
</div>

<div class="prog-track">
  <div class="prog-fill" id="prog" style="width:0%"></div>
</div>

<div class="card" id="card">
  <div class="card-stripe"></div>
  <div class="card-body" id="card-body"></div>
  <div class="card-footer">
    <button class="fn-back" id="btn-back" onclick="goBack()" disabled>Back</button>
    <span style="font-size:12px;color:#bbb" id="nav-hint"></span>
    <button class="fn-next" id="btn-next" onclick="goNext()">Start deck</button>
  </div>
</div>

<script>
var cur = 0, correct = 0, attempted = 0;
var ans = {};

var cards = [
  { type: 'intro' },

  // Learn cards
  { type: 'learn', num: 1, emoji: '🍎', word: 'one',   count: 1 },
  { type: 'learn', num: 2, emoji: '🌻', word: 'two',   count: 2 },
  { type: 'learn', num: 3, emoji: '🐸', word: 'three', count: 3 },

  // Multiple choice quiz
  { type: 'mc', instruction: 'How many apples?',  emoji: '🍎', correct: 2, choices: [1,2,3] },
  { type: 'mc', instruction: 'How many flowers?', emoji: '🌻', correct: 3, choices: [2,3,4] },

  // Learn cards
  { type: 'learn', num: 4, emoji: '🐱', word: 'four', count: 4 },
  { type: 'learn', num: 5, emoji: '⭐', word: 'five', count: 5 },

  // Type-in quiz
  { type: 'typein', instruction: 'Count the cats. Type the number.', emoji: '🐱', correct: 4 },

  // Sort / tap-in-order card
  { type: 'sort', instruction: 'Tap the numbers in order from smallest to biggest.', items: [3,1,5,2,4] },

  // Multiple choice
  { type: 'mc', instruction: 'How many stars?', emoji: '⭐', correct: 5, choices: [4,5,6] },

  { type: 'finish' }
];

var quizCards = cards.filter(function(c){ return c.type==='mc'||c.type==='typein'||c.type==='sort'; });

function getStripeColor() {
  var t = cards[cur].type;
  if(t==='learn')  return '#185FA5';
  if(t==='mc')     return '#1D9E75';
  if(t==='typein') return '#854F0B';
  if(t==='sort')   return '#533AB7';
  if(t==='finish') return '#1D9E75';
  return '#185FA5';
}

function objects(emoji, n) {
  var s = '';
  for(var i=0;i<n;i++) s += '<div class="obj" style="animation-delay:'+(i*.07)+'s">'+emoji+'</div>';
  return s;
}

function updateChrome() {
  var total = cards.length - 2; // exclude intro & finish
  var pos = Math.max(0, cur);
  document.getElementById('counter').textContent = 'Card '+(cur+1)+' of '+cards.length;
  var pct = cur === 0 ? 0 : cur >= cards.length-1 ? 100 : Math.round((cur/(cards.length-2))*100);
  document.getElementById('prog').style.width = pct+'%';

  var qa = quizCards.length;
  document.getElementById('score-chip').textContent = correct+' / '+qa;

  document.getElementById('btn-back').disabled = cur===0;
  var nxt = document.getElementById('btn-next');
  var c = cards[cur];
  nxt.disabled = (c.type==='mc'||c.type==='typein'||c.type==='sort') && ans[cur]===undefined;
  nxt.textContent = cur===0?'Start deck': cur>=cards.length-2?'See results':'Next card';
  document.getElementById('nav-hint').textContent = '';

  document.querySelector('.card-stripe').style.background = getStripeColor();
}

function render() {
  updateChrome();
  var c = cards[cur];
  var b = document.getElementById('card-body');

  if(c.type==='intro') {
    b.innerHTML = '<div style="font-size:64px;margin-bottom:12px">🌱</div>'
      +'<div class="card-type-badge badge-learn">Boom Cards deck</div>'
      +'<div class="card-instruction">The Counting Garden</div>'
      +'<div class="card-hint" style="max-width:280px">Count objects from 1 to 5.<br>Tap your answer on each card.<br>Listen to the audio on each card.</div>'
      +'<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">'
      +'<span style="font-size:12px;padding:4px 12px;border-radius:99px;background:#E6F1FB;color:#0C447C;font-weight:600">12 cards</span>'
      +'<span style="font-size:12px;padding:4px 12px;border-radius:99px;background:#E1F5EE;color:#085041;font-weight:600">Self-checking</span>'
      +'<span style="font-size:12px;padding:4px 12px;border-radius:99px;background:#EEEDFE;color:#3C3489;font-weight:600">Audio support</span>'
      +'</div>';

  } else if(c.type==='learn') {
    b.innerHTML = '<div class="card-type-badge badge-learn">Learn</div>'
      +'<button class="audio-btn" onclick="playAudio(\''+c.num+' — '+c.word+'\')">'
      +'<svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Tap to hear</button>'
      +'<div class="big-num">'+c.num+'</div>'
      +'<div class="num-word">'+c.word+'</div>'
      +'<div class="objects-area">'+objects(c.emoji, c.count)+'</div>'
      +'<div style="font-size:13px;color:#aaa">Count aloud: '+c.count+' '+c.emoji+'</div>';

  } else if(c.type==='mc') {
    var prev = ans[cur];
    var btns = c.choices.map(function(ch){
      var cl = prev!==undefined ? (ch===c.correct?'correct':(ch===prev?'wrong':'')) : '';
      return '<button class="choice '+cl+'" onclick="pickMC('+ch+','+c.correct+')" '+(prev!==undefined?'disabled':'')+'>'+ch+'</button>';
    }).join('');
    var fb = prev!==undefined ? (prev===c.correct
      ? '<div class="feedback good">Correct! Well done!</div>'
      : '<div class="feedback bad">The answer is '+c.correct+'. Keep going!</div>') : '';
    b.innerHTML = '<div class="card-type-badge badge-quiz">Count &amp; choose</div>'
      +'<button class="audio-btn" onclick="playAudio(\''+c.instruction+'\')"><svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Hear question</button>'
      +'<div class="card-instruction">'+c.instruction+'</div>'
      +'<div class="objects-area">'+objects(c.emoji, c.correct)+'</div>'
      +'<div class="choices">'+btns+'</div>'+fb;

  } else if(c.type==='typein') {
    var prev = ans[cur];
    var isCor = prev!==undefined && parseInt(prev)===c.correct;
    var isCl  = prev!==undefined ? (isCor?'correct':'wrong') : '';
    var fb = prev!==undefined ? (isCor
      ? '<div class="feedback good">Correct! That is '+c.correct+'!</div>'
      : '<div class="feedback bad">Try '+c.correct+'. Keep going!</div>') : '';
    b.innerHTML = '<div class="card-type-badge badge-sort">Type the answer</div>'
      +'<button class="audio-btn" onclick="playAudio(\''+c.instruction+'\')"><svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Hear question</button>'
      +'<div class="card-instruction">'+c.instruction+'</div>'
      +'<div class="objects-area">'+objects(c.emoji, c.correct)+'</div>'
      +'<input class="type-input '+isCl+'" id="type-field" type="number" min="1" max="9" placeholder="?" '+(prev!==undefined?'value="'+prev+'" disabled':'')+'>'
      +'<button class="submit-btn" id="submit-btn" onclick="submitType()" '+(prev!==undefined?'disabled':'')+'>Check</button>'
      +fb;

  } else if(c.type==='sort') {
    var prev = ans[cur];
    var order = prev ? prev : c.items.slice();
    var selected = null;
    var html = '<div class="card-type-badge badge-sort">Put in order</div>'
      +'<button class="audio-btn" onclick="playAudio(\''+c.instruction+'\')"><svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Hear question</button>'
      +'<div class="card-instruction">'+c.instruction+'</div>';
    if(prev) {
      var correct2 = JSON.stringify(prev)==='[1,2,3,4,5]';
      html += '<div class="sort-area">';
      prev.forEach(function(n,i){
        var cl = correct2?'correct':'wrong';
        html += '<div class="sort-item '+cl+'"><span style="font-size:24px;font-weight:800">'+n+'</span><span class="sort-label">'+(i+1)+'</span></div>';
      });
      html += '</div>'+(correct2
        ? '<div class="feedback good">Perfect order!</div>'
        : '<div class="feedback bad">The order is 1, 2, 3, 4, 5.</div>');
    } else {
      html += '<div class="sort-area" id="sort-area">';
      c.items.forEach(function(n){
        html += '<div class="sort-item" onclick="sortTap('+n+')" id="si-'+n+'"><span style="font-size:24px;font-weight:800">'+n+'</span><span class="sort-label">tap to move</span></div>';
      });
      html += '</div><div style="font-size:12px;color:#aaa;margin-top:8px">Tap a number, then tap where to place it.</div>';
      html += '<button class="submit-btn" id="sort-submit" onclick="submitSort()" style="margin-top:12px">Check order</button>';
    }
    b.innerHTML = html;

  } else if(c.type==='finish') {
    var qa = quizCards.length;
    var pct = Math.round((correct/qa)*100);
    var msg = pct===100 ? 'Perfect score!' : pct>=60 ? 'Great work!' : 'Good effort — keep practicing!';
    b.innerHTML = '<div class="finish">'
      +'<div class="finish-trophy">🏅</div>'
      +'<div class="finish-title">Deck complete!</div>'
      +'<div class="finish-sub">'+msg+'</div>'
      +'<div class="score-display">'
      +'<div class="score-card"><div class="sc-num">'+correct+'</div><div class="sc-label">Correct</div></div>'
      +'<div class="score-card"><div class="sc-num">'+qa+'</div><div class="sc-label">Questions</div></div>'
      +'<div class="score-card"><div class="sc-num">'+pct+'%</div><div class="sc-label">Score</div></div>'
      +'</div>'
      +'<div class="badges-earned">'
      +'<div class="badge-item"><div class="badge-ring">🌱</div><div class="badge-lbl">Counting 1–5</div></div>'
      +'<div class="badge-item"><div class="badge-ring">🌟</div><div class="badge-lbl">Garden Explorer</div></div>'
      +(pct===100?'<div class="badge-item"><div class="badge-ring">🏆</div><div class="badge-lbl">Perfect deck!</div></div>':'')
      +'</div>'
      +'<button class="replay-btn" onclick="restart()">Play deck again</button>'
      +'</div>';
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-next').textContent = 'Done';
  }
}

// Sort state
var sortOrder = [];
var sortPicked = null;

function sortTap(n) {
  if(ans[cur]!==undefined) return;
  var items = cards[cur].items.slice();
  if(!window._sortCurrent) window._sortCurrent = items.slice();
  var sc = window._sortCurrent;

  if(sortPicked===null) {
    sortPicked = n;
    document.getElementById('si-'+n).classList.add('selected');
  } else if(sortPicked===n) {
    sortPicked = null;
    document.getElementById('si-'+n).classList.remove('selected');
  } else {
    // swap
    var ai = sc.indexOf(sortPicked), bi = sc.indexOf(n);
    var tmp = sc[ai]; sc[ai]=sc[bi]; sc[bi]=tmp;
    window._sortCurrent = sc;
    sortPicked = null;
    // re-render sort area
    var area = document.getElementById('sort-area');
    area.innerHTML = '';
    sc.forEach(function(num){
      var d = document.createElement('div');
      d.className='sort-item';
      d.id='si-'+num;
      d.innerHTML='<span style="font-size:24px;font-weight:800">'+num+'</span><span class="sort-label">tap to move</span>';
      d.onclick=function(){sortTap(num);};
      area.appendChild(d);
    });
  }
}

function submitSort() {
  var sc = window._sortCurrent || cards[cur].items.slice();
  ans[cur] = sc;
  var c = cards[cur];
  var isCorrect = JSON.stringify(sc)==='[1,2,3,4,5]';
  if(isCorrect) correct++;
  attempted++;
  window._sortCurrent = null;
  sortPicked = null;
  updateChrome();
  render();
}

function pickMC(chosen, correctAns) {
  if(ans[cur]!==undefined) return;
  ans[cur] = chosen;
  if(chosen===correctAns) correct++;
  attempted++;
  updateChrome();
  render();
}

function submitType() {
  var val = document.getElementById('type-field').value;
  if(!val) return;
  ans[cur] = val;
  if(parseInt(val)===cards[cur].correct) correct++;
  attempted++;
  updateChrome();
  render();
}

function playAudio(text) {
  if('speechSynthesis' in window) {
    var u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85; u.pitch = 1.1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function goNext() { if(cur<cards.length-1){ cur++; render(); } }
function goBack() { if(cur>0){ cur--; render(); } }
function restart() { cur=0; correct=0; attempted=0; ans={}; window._sortCurrent=null; sortPicked=null; render(); }

render();
</script>
</body>
</html>
